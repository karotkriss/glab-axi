name: Release

# Publishes glab-axi to npm when a GitHub release is published.
# Release notes are sourced from the matching CHANGELOG.md section at
# release-creation time (see skills/glab-axi-release/SKILL.md); this workflow
# only handles the npm publish. Auth uses the NPM_TOKEN repository secret,
# which a maintainer must add once (Settings -> Secrets and variables ->
# Actions). id-token: write enables --provenance for supply-chain trust.

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - name: Build
        run: npm run build
      - name: Publish to npm
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
