name: Release

# Publishes glab-axi to npm when a GitHub release is published.
# Release notes are sourced from the matching CHANGELOG.md section at
# release-creation time (see skills/glab-axi-release/SKILL.md); this workflow
# only handles the npm publish.
#
# Auth uses NPM_TOKEN. Because this job declares `environment: npm-publish`, it
# can read organization secrets, repository secrets, and secrets on the
# `npm-publish` environment; an environment secret of that name takes precedence
# over a repository secret. So NPM_TOKEN may live in either place:
#   - Environment secret on `npm-publish` (preferred): scopes the token to jobs
#     declaring that environment, and allows environment protection rules.
#   - Repository secret: works, but every workflow in the repo can read it.
# id-token: write enables --provenance for supply-chain trust.
#
# workflow_dispatch runs the same pipeline in dry-run mode (the default): it
# packs and validates the tarball and checks that the token authenticates,
# without uploading anything. A real publish happens only on
# `release: published`, so a dispatch with dry_run disabled is just a
# build/test smoke run.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Verify the publish pipeline without uploading to npm"
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - name: Build
        run: npm run build
      - name: Test
        run: npm test
      # npm whoami prints the resolved npm username, never the token itself.
      - name: Verify npm auth (dry run)
        if: inputs.dry_run
        run: npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Pack and validate the tarball (dry run)
        if: inputs.dry_run
        run: npm publish --dry-run
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish to npm
        if: github.event_name == 'release'
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
