name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Type-check & build
        run: npm run build
      - name: Lint
        run: npm run lint
      - name: Format check
        run: npm run format:check
      - name: Skill freshness check
        run: npm run skill:check
      - name: Test
        run: npm test
